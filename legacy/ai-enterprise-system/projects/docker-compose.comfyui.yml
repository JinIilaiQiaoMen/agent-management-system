version: '3.8'

services:
  comfyui:
    build: .
    container_name: comfyui
    ports:
      - "8188:8188"
    volumes:
      - comfyui_models:/app/ComfyUI/models
      - comfyui_output:/app/ComfyUI/output
      - comfyui_input:/app/ComfyUI/input
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  comfyui_models:
  comfyui_output:
  comfyui_input:
