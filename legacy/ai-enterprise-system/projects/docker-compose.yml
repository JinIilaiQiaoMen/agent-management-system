version: '3.8'

services:
  # Next.js 应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-intelligent-system
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # Supabase 配置（如果使用）
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      # ComfyUI 配置
      - NEXT_PUBLIC_COMFYUI_ENDPOINT=${NEXT_PUBLIC_COMFYUI_ENDPOINT:-http://localhost:8188}
      - COMFYUI_WORKFLOW_PATH=./public/workflows
      # JWT 配置
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_key_change_in_production}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # 持久化日志
      - ./logs:/app/work/logs/bypass
      # 持久化上传文件
      - ./uploads:/app/uploads
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: postgres-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-your_secure_password}
      - POSTGRES_DB=${POSTGRES_DB:-ai_system}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8
    volumes:
      # 数据持久化
      - postgres-data:/var/lib/postgresql/data
      # 初始化脚本
      - ./init-db:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_system}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis（可选，用于缓存）
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  app-network:
    driver: bridge
