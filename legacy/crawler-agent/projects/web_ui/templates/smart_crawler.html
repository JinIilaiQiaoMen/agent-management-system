<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能爬虫 - 一体化分析下载</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .url-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .url-input-group {
            display: flex;
            gap: 12px;
        }

        .url-input-group input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .url-input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .panel h2 {
            color: #667eea;
            font-size: 18px;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        /* 截图区域 */
        .screenshot-container {
            position: relative;
            background: #f9fafb;
            border-radius: 8px;
            overflow: hidden;
            min-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .screenshot-wrapper {
            position: relative;
            max-width: 100%;
            overflow: auto;
        }

        .screenshot-img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        .element-box {
            position: absolute;
            border: 2px solid #667eea;
            border-radius: 4px;
            background: rgba(102, 126, 234, 0.1);
            cursor: pointer;
            transition: all 0.2s;
        }

        .element-box:hover {
            border-color: #5568d3;
            background: rgba(102, 126, 234, 0.2);
            z-index: 10;
        }

        .element-box.selected {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.2);
        }

        .element-box .checkbox {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 24px;
            height: 24px;
            background: white;
            border: 2px solid #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: #667eea;
            transition: all 0.2s;
        }

        .element-box.selected .checkbox {
            background: #10b981;
            border-color: #10b981;
            color: white;
        }

        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            justify-content: center;
        }

        .zoom-controls button {
            width: 32px;
            height: 32px;
            border: 1px solid #e5e7eb;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }

        .zoom-controls button:hover {
            background: #f9fafb;
            border-color: #667eea;
        }

        .zoom-level {
            min-width: 60px;
            text-align: center;
            font-size: 14px;
            color: #666;
        }

        /* 元素列表 */
        .filter-section {
            margin-bottom: 16px;
        }

        .filter-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .filter-checkbox input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .filter-checkbox span {
            font-size: 14px;
            color: #666;
        }

        .element-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .element-item {
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            margin-bottom: 8px;
            background: white;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .element-item:hover {
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.1);
        }

        .element-item.selected {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.05);
        }

        .element-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .element-info {
            flex: 1;
            min-width: 0;
        }

        .element-type {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .element-type-image {
            background: #3b82f6;
            color: white;
        }

        .element-type-video {
            background: #10b981;
            color: white;
        }

        .element-type-audio {
            background: #f59e0b;
            color: white;
        }

        .element-type-doc {
            background: #8b5cf6;
            color: white;
        }

        .element-url {
            font-size: 12px;
            color: #666;
            word-break: break-all;
            display: block;
        }

        .select-all-section {
            padding: 12px;
            background: #f9fafb;
            border-radius: 6px;
            margin-bottom: 16px;
        }

        .select-all-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .select-info {
            font-size: 13px;
            color: #666;
        }

        .select-count {
            font-weight: 600;
            color: #667eea;
        }

        /* 保存配置区域 */
        .save-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .save-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .save-option {
            padding: 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .save-option:hover {
            border-color: #667eea;
        }

        .save-option.selected {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }

        .save-option-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .save-option-radio {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .save-option-title {
            font-weight: 500;
            font-size: 14px;
            color: #333;
        }

        .save-option-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 13px;
        }

        .download-section {
            margin-top: 16px;
        }

        .download-btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .progress-bar {
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 12px;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
            width: 0%;
        }

        .progress-text {
            text-align: center;
            font-size: 13px;
            color: #666;
            margin-top: 8px;
            display: none;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            color: #ccc;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-top: 12px;
            font-size: 14px;
            display: none;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #10b981;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>🕷️ 智能爬虫</h1>
            <p>AI驱动的网页内容智能分析与下载工具</p>
        </div>

        <!-- URL输入 -->
        <div class="url-section">
            <div class="url-input-group">
                <input type="url" id="urlInput" placeholder="输入目标网页URL（例如：https://example.com）">
                <button id="analyzeBtn" class="btn btn-primary">
                    <span id="analyzeBtnText">🔍 智能分析</span>
                </button>
            </div>
            <div id="analyzeAlert" class="alert"></div>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 左侧：截图展示 -->
            <div class="panel">
                <h2>📸 网页截图</h2>
                <div class="screenshot-container" id="screenshotContainer">
                    <div class="empty-state" id="screenshotEmpty">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <p>请输入URL并点击"智能分析"</p>
                    </div>
                    <div class="screenshot-wrapper" id="screenshotWrapper" style="display: none;">
                        <img id="screenshotImg" class="screenshot-img" src="" alt="网页截图">
                        <div id="elementBoxes"></div>
                    </div>
                </div>
                <div class="zoom-controls" id="zoomControls" style="display: none;">
                    <button onclick="zoomOut()">-</button>
                    <span class="zoom-level" id="zoomLevel">100%</span>
                    <button onclick="zoomIn()">+</button>
                </div>
            </div>

            <!-- 右侧：元素列表 -->
            <div class="panel">
                <h2>📋 元素列表</h2>

                <!-- 筛选器 -->
                <div class="filter-section" id="filterSection" style="display: none;">
                    <label class="filter-checkbox">
                        <input type="checkbox" id="filterImage" checked onchange="filterElements()">
                        <span>🖼️ 图片 (<span id="filterImageCount">0</span>)</span>
                    </label>
                    <label class="filter-checkbox">
                        <input type="checkbox" id="filterVideo" checked onchange="filterElements()">
                        <span>🎬 视频 (<span id="filterVideoCount">0</span>)</span>
                    </label>
                    <label class="filter-checkbox">
                        <input type="checkbox" id="filterAudio" checked onchange="filterElements()">
                        <span>🎵 音频 (<span id="filterAudioCount">0</span>)</span>
                    </label>
                    <label class="filter-checkbox">
                        <input type="checkbox" id="filterDoc" checked onchange="filterElements()">
                        <span>📄 文档 (<span id="filterDocCount">0</span>)</span>
                    </label>
                </div>

                <!-- 全选区 -->
                <div class="select-all-section" id="selectAllSection" style="display: none;">
                    <div class="select-all-row">
                        <label class="filter-checkbox">
                            <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
                            <span>一键全选</span>
                        </label>
                        <span class="select-info">已选择：<span class="select-count" id="selectedCount">0</span>/<span id="totalCount">0</span></span>
                    </div>
                </div>

                <!-- 元素列表 -->
                <div class="element-list" id="elementList">
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        <p>暂无元素</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 保存配置 -->
        <div class="save-section" id="saveSection" style="display: none;">
            <h2>💾 保存配置</h2>

            <div class="save-options">
                <!-- 保存到文件夹 -->
                <div class="save-option selected" data-save-type="folder" onclick="selectSaveType('folder')">
                    <div class="save-option-header">
                        <input type="radio" name="saveType" value="folder" checked class="save-option-radio">
                        <span class="save-option-title">📁 保存到本地文件夹</span>
                    </div>
                    <input type="text" id="folderPath" value="./downloads" class="save-option-input" placeholder="输出路径">
                </div>

                <!-- 保存为Excel -->
                <div class="save-option" data-save-type="excel" onclick="selectSaveType('excel')">
                    <div class="save-option-header">
                        <input type="radio" name="saveType" value="excel" class="save-option-radio">
                        <span class="save-option-title">📊 保存为Excel表格</span>
                    </div>
                    <input type="text" id="excelPath" value="./result.xlsx" class="save-option-input" placeholder="表格路径">
                </div>

                <!-- 保存为CSV -->
                <div class="save-option" data-save-type="csv" onclick="selectSaveType('csv')">
                    <div class="save-option-header">
                        <input type="radio" name="saveType" value="csv" class="save-option-radio">
                        <span class="save-option-title">📄 保存为CSV表格</span>
                    </div>
                    <input type="text" id="csvPath" value="./result.csv" class="save-option-input" placeholder="表格路径">
                </div>
            </div>

            <!-- 下载按钮 -->
            <div class="download-section">
                <button id="downloadBtn" class="btn btn-success download-btn" onclick="downloadElements()" disabled>
                    <span id="downloadBtnText">⬇️ 开始下载</span>
                </button>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">准备下载...</div>
                <div id="downloadAlert" class="alert"></div>
            </div>
        </div>
    </div>

    <script>
        // 全局状态
        let currentElements = [];
        let selectedElements = new Set();
        let currentZoom = 1;
        let saveType = 'folder';

        // DOM 元素
        const urlInput = document.getElementById('urlInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const analyzeBtnText = document.getElementById('analyzeBtnText');
        const analyzeAlert = document.getElementById('analyzeAlert');

        const screenshotContainer = document.getElementById('screenshotContainer');
        const screenshotWrapper = document.getElementById('screenshotWrapper');
        const screenshotImg = document.getElementById('screenshotImg');
        const elementBoxes = document.getElementById('elementBoxes');
        const zoomControls = document.getElementById('zoomControls');

        const elementList = document.getElementById('elementList');
        const filterSection = document.getElementById('filterSection');
        const selectAllSection = document.getElementById('selectAllSection');
        const saveSection = document.getElementById('saveSection');

        // 智能分析
        async function smartAnalyze() {
            const url = urlInput.value.trim();

            if (!url) {
                showAlert('请输入URL', 'error');
                return;
            }

            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                showAlert('请输入有效的URL（以 http:// 或 https:// 开头）', 'error');
                return;
            }

            // 显示加载状态
            analyzeBtn.disabled = true;
            analyzeBtnText.innerHTML = '<span class="loading"></span> 分析中...';
            hideAlert();

            try {
                const response = await fetch('/api/smart/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });

                const result = await response.json();

                if (result.success) {
                    displayResult(result);
                    showAlert(`分析完成！共发现 ${result.summary.total} 个元素`, 'success');
                } else {
                    showAlert('分析失败: ' + result.message, 'error');
                }
            } catch (error) {
                showAlert('网络错误，请重试', 'error');
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtnText.textContent = '🔍 智能分析';
            }
        }

        // 显示结果
        function displayResult(result) {
            currentElements = result.elements;
            selectedElements.clear();

            // 显示截图
            document.getElementById('screenshotEmpty').style.display = 'none';
            screenshotWrapper.style.display = 'block';
            screenshotImg.src = 'data:image/png;base64,' + result.screenshot;

            // 显示筛选器
            filterSection.style.display = 'block';
            selectAllSection.style.display = 'block';
            saveSection.style.display = 'block';
            zoomControls.style.display = 'flex';

            // 更新筛选计数
            document.getElementById('filterImageCount').textContent = result.summary.images;
            document.getElementById('filterVideoCount').textContent = result.summary.videos;
            document.getElementById('filterAudioCount').textContent = result.summary.audio;
            document.getElementById('filterDocCount').textContent = result.summary.docs;

            // 显示元素候选框
            displayElementBoxes(result.elements);

            // 显示元素列表
            displayElementList(result.elements);

            // 更新统计
            updateSelectionStats();
        }

        // 显示元素候选框
        function displayElementBoxes(elements) {
            elementBoxes.innerHTML = '';

            elements.forEach((element, index) => {
                if (!element.bbox) return;

                const box = document.createElement('div');
                box.className = 'element-box';
                box.dataset.id = index;
                box.style.left = `${element.bbox.x * currentZoom}px`;
                box.style.top = `${element.bbox.y * currentZoom}px`;
                box.style.width = `${element.bbox.width * currentZoom}px`;
                box.style.height = `${element.bbox.height * currentZoom}px`;

                // 添加复选框标记
                const checkbox = document.createElement('div');
                checkbox.className = 'checkbox';
                checkbox.textContent = '✓';
                box.appendChild(checkbox);

                // 点击事件
                box.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleElementSelection(index);
                });

                elementBoxes.appendChild(box);
            });
        }

        // 显示元素列表
        function displayElementList(elements) {
            elementList.innerHTML = '';

            elements.forEach((element, index) => {
                const item = document.createElement('div');
                item.className = 'element-item';
                item.dataset.id = index;
                item.dataset.type = element.type;

                let typeClass = '';
                let typeLabel = '';
                switch (element.type) {
                    case 'image':
                        typeClass = 'element-type-image';
                        typeLabel = '图片';
                        break;
                    case 'video':
                        typeClass = 'element-type-video';
                        typeLabel = '视频';
                        break;
                    case 'audio':
                        typeClass = 'element-type-audio';
                        typeLabel = '音频';
                        break;
                    case 'doc':
                        typeClass = 'element-type-doc';
                        typeLabel = '文档';
                        break;
                    default:
                        typeClass = 'element-type-image';
                        typeLabel = '未知';
                }

                item.innerHTML = `
                    <input type="checkbox" class="element-checkbox" data-id="${index}" onchange="toggleElementSelection(${index})">
                    <div class="element-info">
                        <span class="element-type ${typeClass}">${typeLabel}</span>
                        <span class="element-url">${element.src || element.href || '无URL'}</span>
                    </div>
                `;

                // 点击事件
                item.addEventListener('click', (e) => {
                    if (e.target.type !== 'checkbox') {
                        toggleElementSelection(index);
                    }
                });

                elementList.appendChild(item);
            });
        }

        // 切换元素选择
        function toggleElementSelection(index) {
            if (selectedElements.has(index)) {
                selectedElements.delete(index);
            } else {
                selectedElements.add(index);
            }

            // 更新UI
            updateElementBoxSelection(index);
            updateElementItemSelection(index);
            updateSelectionStats();
            updateSelectAllCheckbox();
        }

        // 更新候选框选中状态
        function updateElementBoxSelection(index) {
            const box = elementBoxes.querySelector(`.element-box[data-id="${index}"]`);
            if (box) {
                if (selectedElements.has(index)) {
                    box.classList.add('selected');
                } else {
                    box.classList.remove('selected');
                }
            }
        }

        // 更新列表项选中状态
        function updateElementItemSelection(index) {
            const item = elementList.querySelector(`.element-item[data-id="${index}"]`);
            const checkbox = elementList.querySelector(`.element-checkbox[data-id="${index}"]`);
            if (item && checkbox) {
                if (selectedElements.has(index)) {
                    item.classList.add('selected');
                    checkbox.checked = true;
                } else {
                    item.classList.remove('selected');
                    checkbox.checked = false;
                }
            }
        }

        // 更新选择统计
        function updateSelectionStats() {
            const total = currentElements.length;
            const selected = selectedElements.size;

            document.getElementById('selectedCount').textContent = selected;
            document.getElementById('totalCount').textContent = total;

            // 更新下载按钮
            const downloadBtn = document.getElementById('downloadBtn');
            downloadBtn.disabled = selected === 0;
        }

        // 全选/取消全选
        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll');
            const filteredElements = getFilteredElements();

            if (selectAll.checked) {
                // 全选
                filteredElements.forEach((element, filteredIndex) => {
                    const originalIndex = currentElements.indexOf(element);
                    selectedElements.add(originalIndex);
                    updateElementBoxSelection(originalIndex);
                    updateElementItemSelection(originalIndex);
                });
            } else {
                // 取消全选
                filteredElements.forEach((element, filteredIndex) => {
                    const originalIndex = currentElements.indexOf(element);
                    selectedElements.delete(originalIndex);
                    updateElementBoxSelection(originalIndex);
                    updateElementItemSelection(originalIndex);
                });
            }

            updateSelectionStats();
        }

        // 更新全选复选框状态
        function updateSelectAllCheckbox() {
            const filteredElements = getFilteredElements();
            const selectAll = document.getElementById('selectAll');

            const allSelected = filteredElements.every((element) => {
                const index = currentElements.indexOf(element);
                return selectedElements.has(index);
            });

            selectAll.checked = allSelected && filteredElements.length > 0;
        }

        // 获取筛选后的元素
        function getFilteredElements() {
            return currentElements.filter(element => {
                if (element.type === 'image' && !document.getElementById('filterImage').checked) return false;
                if (element.type === 'video' && !document.getElementById('filterVideo').checked) return false;
                if (element.type === 'audio' && !document.getElementById('filterAudio').checked) return false;
                if (element.type === 'doc' && !document.getElementById('filterDoc').checked) return false;
                return true;
            });
        }

        // 筛选元素
        function filterElements() {
            const filteredElements = getFilteredElements();

            // 更新列表
            elementList.innerHTML = '';
            filteredElements.forEach((element, filteredIndex) => {
                const originalIndex = currentElements.indexOf(element);
                const item = document.createElement('div');
                item.className = 'element-item';
                item.dataset.id = originalIndex;
                item.dataset.type = element.type;

                let typeClass = '';
                let typeLabel = '';
                switch (element.type) {
                    case 'image':
                        typeClass = 'element-type-image';
                        typeLabel = '图片';
                        break;
                    case 'video':
                        typeClass = 'element-type-video';
                        typeLabel = '视频';
                        break;
                    case 'audio':
                        typeClass = 'element-type-audio';
                        typeLabel = '音频';
                        break;
                    case 'doc':
                        typeClass = 'element-type-doc';
                        typeLabel = '文档';
                        break;
                    default:
                        typeClass = 'element-type-image';
                        typeLabel = '未知';
                }

                const isSelected = selectedElements.has(originalIndex);

                item.innerHTML = `
                    <input type="checkbox" class="element-checkbox" data-id="${originalIndex}" ${isSelected ? 'checked' : ''} onchange="toggleElementSelection(${originalIndex})">
                    <div class="element-info">
                        <span class="element-type ${typeClass}">${typeLabel}</span>
                        <span class="element-url">${element.src || element.href || '无URL'}</span>
                    </div>
                `;

                if (isSelected) {
                    item.classList.add('selected');
                }

                elementList.appendChild(item);
            });

            // 更新候选框显示
            elementBoxes.querySelectorAll('.element-box').forEach(box => {
                const index = parseInt(box.dataset.id);
                const element = currentElements[index];
                box.style.display = getFilteredElements().includes(element) ? 'block' : 'none';
            });

            updateSelectAllCheckbox();
        }

        // 缩放控制
        function zoomIn() {
            if (currentZoom < 2) {
                currentZoom += 0.1;
                updateZoom();
            }
        }

        function zoomOut() {
            if (currentZoom > 0.5) {
                currentZoom -= 0.1;
                updateZoom();
            }
        }

        function updateZoom() {
            document.getElementById('zoomLevel').textContent = Math.round(currentZoom * 100) + '%';
            screenshotImg.style.transform = `scale(${currentZoom})`;

            // 更新候选框位置和大小
            currentElements.forEach((element, index) => {
                if (element.bbox) {
                    const box = elementBoxes.querySelector(`.element-box[data-id="${index}"]`);
                    if (box) {
                        box.style.left = `${element.bbox.x * currentZoom}px`;
                        box.style.top = `${element.bbox.y * currentZoom}px`;
                        box.style.width = `${element.bbox.width * currentZoom}px`;
                        box.style.height = `${element.bbox.height * currentZoom}px`;
                    }
                }
            });
        }

        // 选择保存类型
        function selectSaveType(type) {
            saveType = type;

            // 更新UI
            document.querySelectorAll('.save-option').forEach(option => {
                option.classList.remove('selected');
                const radio = option.querySelector('input[type="radio"]');
                radio.checked = false;
            });

            const selectedOption = document.querySelector(`.save-option[data-save-type="${type}"]`);
            if (selectedOption) {
                selectedOption.classList.add('selected');
                const radio = selectedOption.querySelector('input[type="radio"]');
                radio.checked = true;
            }
        }

        // 下载元素
        async function downloadElements() {
            if (selectedElements.size === 0) {
                showAlert('请至少选择一个元素', 'error');
                return;
            }

            const selectedIndices = Array.from(selectedElements);
            const elements = selectedIndices.map(index => currentElements[index]);

            let outputPath;
            if (saveType === 'folder') {
                outputPath = document.getElementById('folderPath').value || './downloads';
            } else if (saveType === 'excel') {
                outputPath = document.getElementById('excelPath').value || './result.xlsx';
            } else { // csv
                outputPath = document.getElementById('csvPath').value || './result.csv';
            }

            const downloadBtn = document.getElementById('downloadBtn');
            const downloadBtnText = document.getElementById('downloadBtnText');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');

            // 显示进度
            downloadBtn.disabled = true;
            downloadBtnText.innerHTML = '<span class="loading"></span> 下载中...';
            progressBar.style.display = 'block';
            progressFill.style.width = '0%';
            progressText.style.display = 'block';
            progressText.textContent = '准备下载...';

            try {
                const response = await fetch('/api/smart/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        elements: elements,
                        save_type: saveType,
                        output_path: outputPath
                    })
                });

                const result = await response.json();

                if (result.success) {
                    progressFill.style.width = '100%';
                    progressText.textContent = `下载完成！成功: ${result.downloaded}, 失败: ${result.failed}`;

                    if (saveType in ['excel', 'csv']) {
                        progressText.textContent += ` | 表格已保存: ${result.table_path}`;
                    }

                    showAlert(`下载完成！成功: ${result.downloaded}, 失败: ${result.failed}`, 'success');
                } else {
                    showAlert('下载失败: ' + result.message, 'error');
                }
            } catch (error) {
                showAlert('网络错误，请重试', 'error');
            } finally {
                downloadBtn.disabled = false;
                downloadBtnText.textContent = '⬇️ 开始下载';
            }
        }

        // 显示提示
        function showAlert(message, type = 'success') {
            analyzeAlert.textContent = message;
            analyzeAlert.className = `alert alert-${type}`;
            analyzeAlert.style.display = 'block';

            const downloadAlert = document.getElementById('downloadAlert');
            if (type === 'success' && downloadAlert) {
                downloadAlert.textContent = message;
                downloadAlert.className = `alert alert-${type}`;
                downloadAlert.style.display = 'block';
            }

            setTimeout(() => {
                if (analyzeAlert) analyzeAlert.style.display = 'none';
                if (downloadAlert) downloadAlert.style.display = 'none';
            }, 5000);
        }

        function hideAlert() {
            if (analyzeAlert) analyzeAlert.style.display = 'none';
            if (document.getElementById('downloadAlert')) {
                document.getElementById('downloadAlert').style.display = 'none';
            }
        }

        // 事件监听
        analyzeBtn.addEventListener('click', smartAnalyze);
    </script>
</body>
</html>
