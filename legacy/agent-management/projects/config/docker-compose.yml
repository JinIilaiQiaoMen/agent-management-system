version: '3.8'

services:
  # ============================================
  # Next.js 应用服务
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-management-system
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      # 数据库配置（需要替换为实际值）
      - DATABASE_URL=postgresql://user:password@postgres:5432/agent_management
      # API 配置（需要替换为实际值）
      - COZE_API_KEY=${COZE_API_KEY}
      - COZE_LLM_API_KEY=${COZE_LLM_API_KEY}
      - COZE_WEB_SEARCH_API_KEY=${COZE_WEB_SEARCH_API_KEY}
      # 对象存储配置（需要替换为实际值）
      - COZE_BUCKET_ENDPOINT_URL=${COZE_BUCKET_ENDPOINT_URL}
      - COZE_BUCKET_NAME=${COZE_BUCKET_NAME}
      - COZE_BUCKET_REGION=${COZE_BUCKET_REGION}
      # 安全配置
      - JWT_SECRET=${JWT_SECRET}
      - API_SECRET_KEY=${API_SECRET_KEY}
      - SESSION_SECRET=${SESSION_SECRET}
      - PASSWORD_SALT=${PASSWORD_SALT}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    depends_on:
      - postgres
    networks:
      - agent-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # PostgreSQL 数据库
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: agent-management-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=agent_management
      - POSTGRES_USER=${POSTGRES_USER:-agent_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - agent-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent_user} -d agent_management"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis（可选，用于缓存）
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: agent-management-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - agent-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  agent-network:
    driver: bridge
